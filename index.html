<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body {
    margin:0;
    font-family:'Inter',sans-serif;
    background:#050509;
    color:white;
}

/* NAVBAR */
nav {
    position:fixed;
    width:100%;
    display:flex;
    justify-content:space-between;
    padding:20px 50px;
    background:rgba(0,0,0,0.6);
    backdrop-filter:blur(10px);
    z-index:100;
}

nav a {
    color:#aaa;
    text-decoration:none;
    margin-left:20px;
    transition:0.3s;
}

nav a:hover, .active {
    color:#fff;
}

/* HERO */
.hero {
    height:100vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    text-align:center;
}

.hero h1 {
    font-size:4rem;
    background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
    -webkit-background-clip:text;
    -webkit-text-fill-color:transparent;
}

.btn {
    margin-top:20px;
    padding:12px 25px;
    border-radius:30px;
    border:none;
    background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
    cursor:pointer;
    transition:0.3s;
}

.btn:hover {
    transform:scale(1.1);
}

/* SECTION */
section {
    padding:100px 50px;
}

/* FILTER BUTTONS */
.filters {
    text-align:center;
    margin-bottom:30px;
}

.filters button {
    padding:10px 20px;
    margin:5px;
    border:none;
    border-radius:20px;
    background:#111;
    color:white;
    cursor:pointer;
}

.filters button.active {
    background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
}

/* GRID */
.grid {
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
    gap:25px;
}

/* CARD */
.card {
    border-radius:15px;
    overflow:hidden;
    transition:0.4s;
}

.card:hover {
    transform:translateY(-10px) scale(1.02);
}

iframe, img {
    width:100%;
    height:250px;
    border:none;
}

/* PRICING */
.price-card {
    padding:20px;
    background:#111;
    border-radius:15px;
    text-align:center;
}

.price {
    color:#C9A1F0;
    font-size:1.5rem;
}

/* FORM */
form input, form textarea, form select {
    width:100%;
    padding:12px;
    margin:10px 0;
    border-radius:8px;
    border:none;
}

footer {
    text-align:center;
    padding:50px;
    color:#777;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<div>PrimeFlow</div>
<div>
<a href="#work">Work</a>
<a href="#pricing">Pricing</a>
<a href="#order">Order</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<h1>We Create Viral Content</h1>
<p>Editing • Animation • Design</p>
<button class="btn" onclick="scrollToSection('order')">Start Project</button>
</section>

<!-- WORK -->
<section id="work">
<h2>Our Work</h2>

<div class="filters">
<button class="active" onclick="filter('all',this)">All</button>
<button onclick="filter('editing',this)">Video Editing</button>
<button onclick="filter('animation',this)">Animation</button>
<button onclick="filter('design',this)">Design</button>
</div>

<div class="grid">

<!-- VIDEO EDITING -->
<div class="card" data-cat="editing">
<iframe src="https://drive.google.com/file/d/1Uk_xbE1idJdXPhVf-GnG0vq72L719MTn/preview"></iframe>
</div>

<div class="card" data-cat="editing">
<iframe src="https://drive.google.com/file/d/1ckvhMgp0gTTWBwmOXaNMCKMU3pIGS7eF/preview"></iframe>
</div>

<div class="card" data-cat="editing">
<iframe src="https://drive.google.com/file/d/1ptn8VXK2ysjQh7Ij_jqHm5TGAT-T9Emf/preview"></iframe>
</div>

<div class="card" data-cat="editing">
<iframe src="https://drive.google.com/file/d/16o_ZX4LCJbMcZREonoRq6KWtH-5Nc8aP/preview"></iframe>
</div>

<!-- ANIMATION -->
<div class="card" data-cat="animation">
<iframe src="https://drive.google.com/file/d/1Tjo3t-zTR7Dubpl3fBGv__nOdX528T4c/preview"></iframe>
</div>

<div class="card" data-cat="animation">
<iframe src="https://drive.google.com/file/d/1i08rY4_pNrzm8hnRnUHru-IeQGBOvYkR/preview"></iframe>
</div>

<div class="card" data-cat="animation">
<iframe src="https://drive.google.com/file/d/1lzOx7mjvDYy0JzRmk4IrrhORhxpIo16c/preview"></iframe>
</div>

<div class="card" data-cat="animation">
<iframe src="https://drive.google.com/file/d/1gsCPhe5W-4UADjVbndktFEMUcPvj3zpl/preview"></iframe>
</div>

<!-- DESIGN -->
<div class="card" data-cat="design">
<img src="https://lh3.googleusercontent.com/d/1UiDcyn-XxPzaWM0M5hWAqRSry9SoNvcO">
</div>

<div class="card" data-cat="design">
<img src="https://lh3.googleusercontent.com/d/1UC3waeVQFbhh0GMv_v0_XdDEQN4AhHMo">
</div>

<div class="card" data-cat="design">
<img src="https://lh3.googleusercontent.com/d/1u6Td0sJ30MgngZSmyu8wc3xRQR7MXpOE">
</div>

<div class="card" data-cat="design">
<img src="https://lh3.googleusercontent.com/d/1YFD7dOu41_at3jLrBeXymShVX3vixeqF">
</div>

</div>
</section>

<!-- PRICING -->
<section id="pricing">
<h2>Pricing</h2>

<div class="grid">
<div class="price-card"><h3>Basic</h3><div class="price">$30-100</div></div>
<div class="price-card"><h3>Standard</h3><div class="price">$100-150</div></div>
<div class="price-card"><h3>Pro</h3><div class="price">$150-200</div></div>
<div class="price-card"><h3>Premium</h3><div class="price">$200+</div></div>
</div>
</section>

<!-- ORDER -->
<section id="order">
<h2>Start Your Project</h2>

<form onsubmit="sendEmail(event)">
<input type="text" id="name" placeholder="Name" required>
<input type="email" id="email" placeholder="Email" required>

<select id="service">
<option>Video Editing</option>
<option>Animation</option>
<option>Graphic Design</option>
</select>

<select id="budget">
<option>$30-100</option>
<option>$100-150</option>
<option>$150-200</option>
<option>$200+</option>
</select>

<textarea id="details" placeholder="Project details"></textarea>

<button class="btn">Send Request</button>
</form>
</section>

<footer>
<p>© PrimeFlow</p>
<p>📧 prymflo@gmail.com</p>
</footer>

<script>
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function filter(type,btn){
let cards=document.querySelectorAll('.card');
let buttons=document.querySelectorAll('.filters button');

buttons.forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

cards.forEach(card=>{
if(type==="all"||card.dataset.cat===type){
card.style.display="block";
}else{
card.style.display="none";
}
});
}

function sendEmail(e){
e.preventDefault();

let body=`Name:${name.value}%0AEmail:${email.value}%0AService:${service.value}%0ABudget:${budget.value}%0ADetails:${details.value}`;

window.location.href=`mailto:prymflo@gmail.com?subject=Project&body=${body}`;
}
</script>

</body>
</html>
