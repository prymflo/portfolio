<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body {
margin:0;
font-family:'Inter',sans-serif;
background:#050509;
color:white;
overflow-x:hidden;
}

/* NAV */
nav {
position:fixed;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:rgba(0,0,0,0.5);
backdrop-filter:blur(12px);
z-index:100;
}

nav img {
height:40px;
object-fit:contain;
}

nav a {
color:#aaa;
margin-left:20px;
text-decoration:none;
transition:0.3s;
}

nav a:hover {
color:white;
}

/* HERO */
.hero {
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1 {
font-size:5rem;
line-height:1.1;
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.hero p {
margin-top:20px;
color:#aaa;
}

.btn {
margin-top:30px;
padding:15px 35px;
border:none;
border-radius:50px;
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
cursor:pointer;
transition:0.4s;
}

.btn:hover {
transform:scale(1.1);
box-shadow:0 0 40px rgba(201,161,240,0.5);
}

/* SECTION */
section {
padding:120px 80px;
}

h2 {
text-align:center;
font-size:2.5rem;
margin-bottom:50px;
}

/* FILTER */
.filters {
text-align:center;
margin-bottom:40px;
}

.filters button {
padding:10px 20px;
margin:5px;
border-radius:20px;
border:none;
background:#111;
color:white;
cursor:pointer;
}

.filters .active {
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
}

/* FEATURED */
.featured {
max-width:1100px;
margin:auto;
border-radius:20px;
overflow:hidden;
margin-bottom:50px;
}

.featured iframe {
width:100%;
height:450px;
}

/* GRID */
.grid {
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
}

.card {
border-radius:20px;
overflow:hidden;
transition:0.4s;
}

.card:hover {
transform:scale(1.05);
}

iframe, img {
width:100%;
height:250px;
border:none;
}

/* PRICING */
.pricing {
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.price-box {
padding:30px;
border-radius:20px;
background:#111;
text-align:center;
width:250px;
transition:0.4s;
}

.price-box:hover {
transform:scale(1.1);
}

.price {
color:#C9A1F0;
font-size:2rem;
}

/* FORM */
form {
max-width:500px;
margin:auto;
}

form input, form textarea, form select {
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
}

/* SCROLL ANIMATION */
.reveal {
opacity:0;
transform:translateY(60px);
transition:1s;
}

.reveal.active {
opacity:1;
transform:translateY(0);
}

footer {
text-align:center;
padding:60px;
color:#777;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<img src="https://lh3.googleusercontent.com/d/1PfQ73bYvnnha3x9-cl7Vme6lh_33QRI0">
<div>
<a href="#work">Work</a>
<a href="#pricing">Pricing</a>
<a href="#order">Order</a>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<h1>Create Content That Dominates</h1>
<p>Editing • Animation • Design</p>
<button class="btn" onclick="scrollToSection('order')">Start Project</button>
</section>

<!-- WORK -->
<section id="work" class="reveal">
<h2>Selected Work</h2>

<div class="filters">
<button class="active" onclick="filter('all',this)">All</button>
<button onclick="filter('editing',this)">Editing</button>
<button onclick="filter('animation',this)">Animation</button>
<button onclick="filter('design',this)">Design</button>
</div>

<div class="featured">
<iframe src="https://drive.google.com/file/d/1Uk_xbE1idJdXPhVf-GnG0vq72L719MTn/preview"></iframe>
</div>

<div class="grid">

<!-- VIDEO -->
<iframe src="https://drive.google.com/file/d/1ckvhMgp0gTTWBwmOXaNMCKMU3pIGS7eF/preview"></iframe>
<iframe src="https://drive.google.com/file/d/1ptn8VXK2ysjQh7Ij_jqHm5TGAT-T9Emf/preview"></iframe>
<iframe src="https://drive.google.com/file/d/16o_ZX4LCJbMcZREonoRq6KWtH-5Nc8aP/preview"></iframe>

<!-- ANIMATION -->
<iframe src="https://drive.google.com/file/d/1Tjo3t-zTR7Dubpl3fBGv__nOdX528T4c/preview"></iframe>
<iframe src="https://drive.google.com/file/d/1i08rY4_pNrzm8hnRnUHru-IeQGBOvYkR/preview"></iframe>
<iframe src="https://drive.google.com/file/d/1lzOx7mjvDYy0JzRmk4IrrhORhxpIo16c/preview"></iframe>
<iframe src="https://drive.google.com/file/d/1gsCPhe5W-4UADjVbndktFEMUcPvj3zpl/preview"></iframe>

<!-- DESIGN -->
<img src="https://lh3.googleusercontent.com/d/1UiDcyn-XxPzaWM0M5hWAqRSry9SoNvcO">
<img src="https://lh3.googleusercontent.com/d/1UC3waeVQFbhh0GMv_v0_XdDEQN4AhHMo">
<img src="https://lh3.googleusercontent.com/d/1u6Td0sJ30MgngZSmyu8wc3xRQR7MXpOE">
<img src="https://lh3.googleusercontent.com/d/1YFD7dOu41_at3jLrBeXymShVX3vixeqF">

</div>
</section>

<!-- PRICING -->
<section id="pricing" class="reveal">
<h2>Pricing</h2>

<div class="pricing">
<div class="price-box"><h3>Basic</h3><div class="price">$30-100</div></div>
<div class="price-box"><h3>Standard</h3><div class="price">$100-150</div></div>
<div class="price-box"><h3>Pro</h3><div class="price">$150-200</div></div>
<div class="price-box"><h3>Premium</h3><div class="price">$200+</div></div>
</div>
</section>

<!-- ORDER -->
<section id="order" class="reveal">
<h2>Start Your Project</h2>

<form onsubmit="sendEmail(event)">
<input type="text" id="name" placeholder="Name" required>
<input type="email" id="email" placeholder="Email" required>

<select id="service">
<option>Video Editing</option>
<option>Animation</option>
<option>Graphic Design</option>
</select>

<select id="budget">
<option>$30-100</option>
<option>$100-150</option>
<option>$150-200</option>
<option>$200+</option>
</select>

<textarea id="details" placeholder="Project details"></textarea>

<button class="btn">Send Request</button>
</form>
</section>

<footer>
<p>© PrimeFlow</p>
<p>📧 prymflo@gmail.com</p>
</footer>

<script>
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function filter(type,btn){
let items=document.querySelectorAll('#work iframe, #work img');
let buttons=document.querySelectorAll('.filters button');

buttons.forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

items.forEach(item=>{
let parent=item.parentElement;
let cat=parent.getAttribute("data-cat");
parent.style.display=(type==="all"||cat===type)?"block":"none";
});
}

let reveals=document.querySelectorAll('.reveal');
window.addEventListener('scroll',()=>{
reveals.forEach(el=>{
if(el.getBoundingClientRect().top < window.innerHeight-100){
el.classList.add('active');
}
});
});

function sendEmail(e){
e.preventDefault();
let body=`Name:${name.value}%0AEmail:${email.value}%0AService:${service.value}%0ABudget:${budget.value}%0ADetails:${details.value}`;
window.location.href=`mailto:prymflo@gmail.com?subject=Project&body=${body}`;
}
</script>

</body>
</html>
