<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#050509;
color:white;
overflow-x:hidden;
}

/* NAV */
.nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:100;
}

.nav img{
height:45px;
filter:brightness(1.5);
}

.nav a{
color:#aaa;
margin-left:25px;
text-decoration:none;
}

.nav a:hover{color:white;}

/* HERO ANIMATION */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{opacity:0; transform:scale(0.9);}
to{opacity:1; transform:scale(1);}
}

.hero h1{
font-size:4.5rem;
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
margin-top:30px;
padding:15px 40px;
border:none;
border-radius:50px;
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 30px #C9A1F0;
}

/* TRUST */
.trust{
display:flex;
justify-content:center;
gap:60px;
padding:40px;
text-align:center;
}

/* SECTION */
section{
padding:120px 60px;
}

h2{
text-align:center;
margin-bottom:40px;
}

/* FILTER */
.filters{
text-align:center;
margin-bottom:30px;
}

.filters button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:20px;
background:#111;
color:white;
cursor:pointer;
}

.filters .active{
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
}

/* CARD */
.card{
background:#111;
border-radius:20px;
overflow:hidden;
transition:0.4s;
}

.card:hover{
transform:translateY(-10px) scale(1.03);
}

.card iframe{
width:100%;
height:400px;
object-fit:cover;
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

/* CONTACT */
.contact{
text-align:center;
padding:100px 20px;
}

.contact a{
color:white;
font-size:20px;
text-decoration:none;
}

footer{
text-align:center;
padding:50px;
color:#777;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<img src="https://lh3.googleusercontent.com/d/1PfQ73bYvnnha3x9-cl7Vme6lh_33QRI0">
<div>
<a href="#work">Work</a>
</div>
</div>

<!-- HERO -->
<section class="hero">
<h1>We Don’t Edit Videos.<br>We Create Attention.</h1>
<button class="btn" onclick="scrollToSection('work')">View Work</button>
</section>

<!-- TRUST -->
<div class="trust">
<div><b>50+</b><br>Clients</div>
<div><b>10M+</b><br>Views</div>
<div><b>100+</b><br>Projects</div>
</div>

<!-- WORK -->
<section id="work">
<h2>Selected Work</h2>

<div class="filters">
<button class="active" onclick="filter('all',this)">All</button>
<button onclick="filter('editing',this)">Editing</button>
<button onclick="filter('animation',this)">Animation</button>
<button onclick="filter('design',this)">Design</button>
</div>

<div class="grid">

<!-- EDITING -->
<div class="card" data-cat="editing"><iframe src="https://drive.google.com/file/d/1Uk_xbE1idJdXPhVf-GnG0vq72L719MTn/preview"></iframe></div>
<div class="card" data-cat="editing"><iframe src="https://drive.google.com/file/d/1ckvhMgp0gTTWBwmOXaNMCKMU3pIGS7eF/preview"></iframe></div>
<div class="card" data-cat="editing"><iframe src="https://drive.google.com/file/d/1ptn8VXK2ysjQh7Ij_jqHm5TGAT-T9Emf/preview"></iframe></div>
<div class="card" data-cat="editing"><iframe src="https://drive.google.com/file/d/16o_ZX4LCJbMcZREonoRq6KWtH-5Nc8aP/preview"></iframe></div>

<!-- ANIMATION -->
<div class="card" data-cat="animation"><iframe src="https://drive.google.com/file/d/1Tjo3t-zTR7Dubpl3fBGv__nOdX528T4c/preview"></iframe></div>
<div class="card" data-cat="animation"><iframe src="https://drive.google.com/file/d/1i08rY4_pNrzm8hnRnUHru-IeQGBOvYkR/preview"></iframe></div>
<div class="card" data-cat="animation"><iframe src="https://drive.google.com/file/d/1lzOx7mjvDYy0JzRmk4IrrhORhxpIo16c/preview"></iframe></div>
<div class="card" data-cat="animation"><iframe src="https://drive.google.com/file/d/1gsCPhe5W-4UADjVbndktFEMUcPvj3zpl/preview"></iframe></div>

<!-- DESIGN -->
<div class="card" data-cat="design"><img src="https://lh3.googleusercontent.com/d/1UiDcyn-XxPzaWM0M5hWAqRSry9SoNvcO"></div>
<div class="card" data-cat="design"><img src="https://lh3.googleusercontent.com/d/1UC3waeVQFbhh0GMv_v0_XdDEQN4AhHMo"></div>
<div class="card" data-cat="design"><img src="https://lh3.googleusercontent.com/d/1u6Td0sJ30MgngZSmyu8wc3xRQR7MXpOE"></div>
<div class="card" data-cat="design"><img src="https://lh3.googleusercontent.com/d/1YFD7dOu41_at3jLrBeXymShVX3vixeqF"></div>

</div>
</section>

<!-- CONTACT -->
<section class="contact">
<h2>Contact</h2>
<p>📧 <a href="mailto:prymflo@gmail.com">prymflo@gmail.com</a></p>
</section>

<footer>
<p>© PrimeFlow</p>
</footer>

<script>
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function filter(type,btn){
let cards=document.querySelectorAll('.card');
let buttons=document.querySelectorAll('.filters button');

buttons.forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

cards.forEach(card=>{
card.style.display=(type==="all"||card.dataset.cat===type)?"block":"none";
});
}
</script>

</body>
</html>
