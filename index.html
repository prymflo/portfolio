<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Inter',sans-serif;
background:#000;
color:white;
}

/* NAV */
nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:1000;
}

nav h2{
font-weight:600;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding-top:80px;
}

.hero h1{
font-size:4rem;
max-width:800px;
}

.hero span{
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
margin-top:30px;
padding:15px 35px;
border-radius:40px;
border:none;
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
cursor:pointer;
font-weight:600;
transition:0.3s;
}

.btn:hover{
transform:scale(1.05);
}

/* STATS */
.stats{
display:flex;
justify-content:center;
gap:60px;
margin:60px 0;
}

.stats div{
text-align:center;
}

/* CATEGORY */
.categories{
display:flex;
justify-content:center;
gap:15px;
margin:30px;
}

.categories button{
padding:10px 20px;
border-radius:20px;
border:none;
background:#111;
color:white;
cursor:pointer;
}

.categories .active{
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:20px;
}

.card{
border-radius:15px;
overflow:hidden;
background:#111;
}

.card iframe{
width:100%;
height:500px;
border:none;
}

/* PRICING */
.pricing{
text-align:center;
padding:80px 20px;
}

.price-grid{
display:flex;
justify-content:center;
flex-wrap:wrap;
gap:20px;
margin-top:30px;
}

.price-box{
padding:30px 40px;
background:#111;
border-radius:20px;
transition:0.3s;
cursor:pointer;
}

.price-box:hover{
transform:scale(1.1);
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
}

/* FORM */
.form{
max-width:500px;
margin:auto;
padding:40px;
}

input,select,textarea{
width:100%;
padding:15px;
margin:10px 0;
border-radius:10px;
border:none;
background:#111;
color:white;
}

footer{
text-align:center;
padding:40px;
color:#aaa;
}
</style>
</head>

<body>

<!-- NAV -->
<nav>
<h2>PrimeFlow</h2>
</nav>

<!-- HERO -->
<section class="hero">
<h1>We Don’t Edit Videos.<br><span>We Create Attention.</span></h1>
<button class="btn" onclick="scrollToSection('order')">Start Project →</button>
</section>

<!-- STATS -->
<div class="stats">
<div><h2>50+</h2><p>Clients</p></div>
<div><h2>10M+</h2><p>Views Generated</p></div>
<div><h2>100+</h2><p>Projects</p></div>
</div>

<!-- CATEGORY -->
<div class="categories">
<button class="active" onclick="filter('editing',this)">Editing</button>
<button onclick="filter('animation',this)">Animation</button>
<button onclick="filter('design',this)">Design</button>
</div>

<!-- WORK -->
<div class="grid">

<!-- EDITING -->
<div class="card" data-cat="editing"><iframe src="https://drive.google.com/file/d/1Uk_xbE1idJdXPhVf-GnG0vq72L719MTn/preview"></iframe></div>
<div class="card" data-cat="editing"><iframe src="https://drive.google.com/file/d/1ckvhMgp0gTTWBwmOXaNMCKMU3pIGS7eF/preview"></iframe></div>
<div class="card" data-cat="editing"><iframe src="https://drive.google.com/file/d/1ptn8VXK2ysjQh7Ij_jqHm5TGAT-T9Emf/preview"></iframe></div>
<div class="card" data-cat="editing"><iframe src="https://drive.google.com/file/d/16o_ZX4LCJbMcZREonoRq6KWtH-5Nc8aP/preview"></iframe></div>

<!-- ANIMATION -->
<div class="card" data-cat="animation"><iframe src="https://drive.google.com/file/d/1Tjo3t-zTR7Dubpl3fBGv__nOdX528T4c/preview"></iframe></div>
<div class="card" data-cat="animation"><iframe src="https://drive.google.com/file/d/1i08rY4_pNrzm8hnRnUHru-IeQGBOvYkR/preview"></iframe></div>

<!-- DESIGN -->
<div class="card" data-cat="design"><iframe src="https://drive.google.com/file/d/1UiDcyn-XxPzaWM0M5hWAqRSry9SoNvcO/preview"></iframe></div>

</div>

<!-- PRICING -->
<section class="pricing">
<h2>Pricing</h2>
<div class="price-grid">
<div class="price-box">$30–100</div>
<div class="price-box">$100–150</div>
<div class="price-box">$150–200</div>
<div class="price-box">$200+</div>
</div>
</section>

<!-- ORDER -->
<section id="order" class="form">
<h2>Start Your Project</h2>

<form onsubmit="sendWhatsApp(event)">
<input id="name" placeholder="Name" required>
<input id="email" placeholder="Email" required>

<select id="service">
<option>Video Editing</option>
<option>Animation</option>
<option>Graphic Design</option>
</select>

<select id="budget">
<option>$30-100</option>
<option>$100-150</option>
<option>$150-200</option>
<option>$200+</option>
</select>

<textarea id="details" placeholder="Project details" required></textarea>

<button class="btn">Submit Project →</button>
</form>
</section>

<footer>
© PrimeFlow — High Converting Content Agency
</footer>

<script>
function filter(type,btn){
let cards=document.querySelectorAll('.card');
let buttons=document.querySelectorAll('.categories button');

buttons.forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

cards.forEach(card=>{
card.style.display=(card.dataset.cat===type)?"block":"none";
});
}

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

/* 💰 WHATSAPP CONVERSION SYSTEM */
function sendWhatsApp(e){
e.preventDefault();

let name=document.getElementById("name").value;
let email=document.getElementById("email").value;
let service=document.getElementById("service").value;
let budget=document.getElementById("budget").value;
let details=document.getElementById("details").value;

let message=`🔥 New Client Request%0A%0A👤 Name: ${name}%0A📧 Email: ${email}%0A🎯 Service: ${service}%0A💰 Budget: ${budget}%0A📝 Details: ${details}`;

window.open(`https://wa.me/971XXXXXXXXX?text=${message}`,'_blank');
}

/* default */
filter('editing',document.querySelector('.categories button'));
</script>

</body>
</html>
