<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#050509;
color:white;
}

/* NAV */
.nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 60px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:100;
}

.nav img{height:40px;}
.nav a{color:#aaa;margin-left:20px;text-decoration:none;}
.nav a:hover{color:white;}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:4.5rem;
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
margin-top:25px;
padding:15px 35px;
border:none;
border-radius:50px;
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
cursor:pointer;
}

/* TRUST */
.trust{
display:flex;
justify-content:center;
gap:50px;
padding:40px;
text-align:center;
}

.trust div{
font-size:1.2rem;
}

/* SECTION */
section{padding:100px 60px;}
h2{text-align:center;margin-bottom:40px;}

/* FILTER */
.filters{text-align:center;margin-bottom:30px;}
.filters button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:20px;
background:#111;
color:white;
cursor:pointer;
}
.filters .active{
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:#111;
border-radius:15px;
overflow:hidden;
}

.card iframe,.card img{
width:100%;
height:250px;
}

/* PRICING */
.pricing{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
}

.box{
background:#111;
padding:25px;
border-radius:15px;
text-align:center;
}

/* FORM */
.form-box{
max-width:500px;
margin:auto;
background:#111;
padding:30px;
border-radius:20px;
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#1a1a1a;
color:white;
}

footer{
text-align:center;
padding:50px;
color:#777;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<img src="https://lh3.googleusercontent.com/d/1PfQ73bYvnnha3x9-cl7Vme6lh_33QRI0">
<div>
<a href="#work">Work</a>
<a href="#pricing">Pricing</a>
<a href="#order">Order</a>
</div>
</div>

<!-- HERO -->
<section class="hero">
<h1>We Don’t Edit Videos.<br>We Create Attention.</h1>
<button class="btn" onclick="scrollToSection('order')">Start Project</button>
</section>

<!-- TRUST -->
<div class="trust">
<div><b>50+</b><br>Clients</div>
<div><b>10M+</b><br>Views Generated</div>
<div><b>100+</b><br>Projects Delivered</div>
</div>

<!-- WORK -->
<section id="work">
<h2>Selected Work</h2>

<div class="filters">
<button class="active" onclick="filter('all',this)">All</button>
<button onclick="filter('editing',this)">Editing</button>
<button onclick="filter('animation',this)">Animation</button>
<button onclick="filter('design',this)">Design</button>
</div>

<div class="grid">

<div class="card" data-cat="editing">
<iframe src="https://drive.google.com/file/d/1Uk_xbE1idJdXPhVf-GnG0vq72L719MTn/preview"></iframe>
</div>

<div class="card" data-cat="editing">
<iframe src="https://drive.google.com/file/d/1ckvhMgp0gTTWBwmOXaNMCKMU3pIGS7eF/preview"></iframe>
</div>

<div class="card" data-cat="animation">
<iframe src="https://drive.google.com/file/d/1Tjo3t-zTR7Dubpl3fBGv__nOdX528T4c/preview"></iframe>
</div>

<div class="card" data-cat="design">
<img src="https://lh3.googleusercontent.com/d/1UiDcyn-XxPzaWM0M5hWAqRSry9SoNvcO">
</div>

</div>
</section>

<!-- PRICING -->
<section id="pricing">
<h2>Pricing</h2>

<div class="pricing">
<div class="box">Basic<br>$30-100</div>
<div class="box">Standard<br>$100-150</div>
<div class="box">Pro<br>$150-200</div>
<div class="box">Premium<br>$200+</div>
</div>
</section>

<!-- ORDER -->
<section id="order">
<h2>Start Your Project</h2>

<div class="form-box">
<form onsubmit="sendEmail(event)">
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">

<select id="service">
<option>Video Editing</option>
<option>Animation</option>
<option>Design</option>
</select>

<select id="budget">
<option>$30-100</option>
<option>$100-150</option>
<option>$150-200</option>
<option>$200+</option>
</select>

<textarea id="details" placeholder="Details"></textarea>

<button class="btn">Send Request</button>
</form>
</div>
</section>

<footer>
<p>© PrimeFlow</p>
<p>📧 prymflo@gmail.com</p>
</footer>

<script>
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function filter(type,btn){
let cards=document.querySelectorAll('.card');
let buttons=document.querySelectorAll('.filters button');

buttons.forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

cards.forEach(card=>{
card.style.display=(type==="all"||card.dataset.cat===type)?"block":"none";
});
}

function sendEmail(e){
e.preventDefault();
let body=`Name:${name.value}%0AEmail:${email.value}%0AService:${service.value}%0ABudget:${budget.value}%0ADetails:${details.value}`;
window.location.href=`mailto:prymflo@gmail.com?subject=Project&body=${body}`;
}
</script>

</body>
</html>
