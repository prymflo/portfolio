<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<!-- ✅ EMAILJS ADDED -->
<script src="https://cdn.jsdelivr.net/npm/emailjs-com@3/dist/email.min.js"></script>

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#050509;
color:white;
overflow-x:hidden;
}

/* NAV */
.nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(10px);
z-index:100;
}

.nav img{
height:45px;
filter:brightness(1.5);
}

.nav a{
color:#aaa;
margin-left:25px;
text-decoration:none;
}

.nav a:hover{color:white;}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:4.5rem;
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
margin-top:30px;
padding:15px 40px;
border:none;
border-radius:50px;
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
cursor:pointer;
}

/* FORM */
.form-box{
max-width:500px;
margin:auto;
background:#111;
padding:30px;
border-radius:20px;
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border:none;
border-radius:10px;
background:#1a1a1a;
color:white;
}
</style>
</head>

<body>

<section class="hero">
<h1>We Don’t Edit Videos.<br>We Create Attention.</h1>
</section>

<section id="order">
<div class="form-box">

<form onsubmit="sendEmail(event)">
<input id="name" placeholder="Name" required>
<input id="email" placeholder="Email" required>

<select id="service">
<option>Video Editing</option>
<option>Animation</option>
<option>Design</option>
</select>

<select id="budget">
<option>$30-100</option>
<option>$100-150</option>
<option>$150-200</option>
<option>$200+</option>
</select>

<textarea id="details" placeholder="Details"></textarea>

<button class="btn">Send Request</button>
</form>

</div>
</section>

<script>
(function(){
  emailjs.init("Ktjf5qHWboVzFpe0_"); // ✅ YOUR KEY ALREADY ADDED
})();

function sendEmail(e){
  e.preventDefault();

  let params = {
    name: document.getElementById("name").value,
    email: document.getElementById("email").value,
    service: document.getElementById("service").value,
    budget: document.getElementById("budget").value,
    details: document.getElementById("details").value
  };

  emailjs.send("service_7pha2yo", "template_tn4ch1n", params)
  .then(function(){
    alert("✅ Request Sent Successfully!");
  }, function(error){
    alert("❌ Failed to send");
    console.log(error);
  });
}
</script>

</body>
</html>
