<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeFlow</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    background: #0A0A14;
    color: white;
}

h1 {
    text-align: center;
    margin-top: 40px;
}

.tabs {
    text-align: center;
    margin: 30px 0;
}

.tabs button {
    padding: 10px 20px;
    margin: 5px;
    border: none;
    cursor: pointer;
    border-radius: 20px;
}

.active {
    background: #C9A1F0;
}

.grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    padding: 20px;
}

.card {
    background: #111;
    border-radius: 10px;
    overflow: hidden;
}

iframe, img {
    width: 100%;
    height: 220px;
    border: none;
    object-fit: cover;
}
</style>
</head>

<body>

<h1>PrimeFlow Portfolio</h1>

<div class="tabs">
<button class="active" onclick="filter('all')">All</button>
<button onclick="filter('editing')">Video Editing</button>
<button onclick="filter('animation')">Animation</button>
<button onclick="filter('design')">Graphic Design</button>
</div>

<div class="grid">

<!-- VIDEO EDITING -->
<div class="card" data-cat="editing">
<iframe src="https://drive.google.com/file/d/1Uk_xbE1idJdXPhVf-GnG0vq72L719MTn/preview" allow="autoplay"></iframe>
</div>

<div class="card" data-cat="editing">
<iframe src="https://drive.google.com/file/d/1ckvhMgp0gTTWBwmOXaNMCKMU3pIGS7eF/preview"></iframe>
</div>

<div class="card" data-cat="editing">
<iframe src="https://drive.google.com/file/d/1ptn8VXK2ysjQh7Ij_jqHm5TGAT-T9Emf/preview"></iframe>
</div>

<div class="card" data-cat="editing">
<iframe src="https://drive.google.com/file/d/16o_ZX4LCJbMcZREonoRq6KWtH-5Nc8aP/preview"></iframe>
</div>

<!-- ANIMATION -->
<div class="card" data-cat="animation">
<iframe src="https://drive.google.com/file/d/1Tjo3t-zTR7Dubpl3fBGv__nOdX528T4c/preview"></iframe>
</div>

<div class="card" data-cat="animation">
<iframe src="https://drive.google.com/file/d/1i08rY4_pNrzm8hnRnUHru-IeQGBOvYkR/preview"></iframe>
</div>

<div class="card" data-cat="animation">
<iframe src="https://drive.google.com/file/d/1lzOx7mjvDYy0JzRmk4IrrhORhxpIo16c/preview"></iframe>
</div>

<div class="card" data-cat="animation">
<iframe src="https://drive.google.com/file/d/1gsCPhe5W-4UADjVbndktFEMUcPvj3zpl/preview"></iframe>
</div>

<!-- GRAPHIC DESIGN -->
<div class="card" data-cat="design">
<img src="https://lh3.googleusercontent.com/d/1UiDcyn-XxPzaWM0M5hWAqRSry9SoNvcO">
</div>

<div class="card" data-cat="design">
<img src="https://lh3.googleusercontent.com/d/1UC3waeVQFbhh0GMv_v0_XdDEQN4AhHMo">
</div>

<div class="card" data-cat="design">
<img src="https://lh3.googleusercontent.com/d/1u6Td0sJ30MgngZSmyu8wc3xRQR7MXpOE">
</div>

<div class="card" data-cat="design">
<img src="https://lh3.googleusercontent.com/d/1YFD7dOu41_at3jLrBeXymShVX3vixeqF">
</div>

<div class="card" data-cat="design">
<img src="https://lh3.googleusercontent.com/d/1Gk99zANEHKQ_PpxyfvacPyU8frig30nb">
</div>

<div class="card" data-cat="design">
<img src="https://lh3.googleusercontent.com/d/1upCaHqAbxfJZcGHlG90jJoFIdXq2Q89o">
</div>

</div>

<script>
function filter(type) {
    let cards = document.querySelectorAll('.card');
    let buttons = document.querySelectorAll('.tabs button');

    buttons.forEach(btn => btn.classList.remove('active'));
    event.target.classList.add('active');

    cards.forEach(card => {
        if (type === 'all' || card.dataset.cat === type) {
            card.style.display = 'block';
        } else {
            card.style.display = 'none';
        }
    });
}
</script>

</body>
</html>
