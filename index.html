<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#050509;
color:white;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:4rem;
max-width:800px;
}

.hero span{
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

/* SECTION */
section{
padding:80px 40px;
}

h2{
text-align:center;
margin-bottom:30px;
font-size:2.2rem;
}

/* CATEGORY */
.categories{
display:flex;
justify-content:center;
gap:15px;
margin-bottom:30px;
}

.categories button{
padding:10px 20px;
border-radius:20px;
border:none;
background:#111;
color:white;
cursor:pointer;
}

.categories .active{
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
}

.card{
background:#111;
border-radius:15px;
overflow:hidden;
}

/* VIDEO FIX */
.video-wrapper{
position:relative;
width:100%;
padding-top:177%; /* 9:16 ratio */
}

.video-wrapper iframe{
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
border:none;
}

/* DESIGN IMAGES */
.card img{
width:100%;
height:250px;
object-fit:cover;
}

/* BEFORE AFTER */
.compare{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.compare-box{
background:#111;
padding:10px;
border-radius:15px;
text-align:center;
}

.compare-box img{
width:250px;
border-radius:10px;
}

/* TESTIMONIAL */
.testimonials{
display:flex;
gap:20px;
justify-content:center;
flex-wrap:wrap;
}

.test{
background:#111;
padding:20px;
border-radius:15px;
max-width:250px;
}

/* PRICING */
.pricing{
display:flex;
justify-content:center;
gap:20px;
flex-wrap:wrap;
}

.price{
background:#111;
padding:25px;
border-radius:15px;
text-align:center;
}

/* FORM */
.form{
max-width:500px;
margin:auto;
}

input,select,textarea{
width:100%;
padding:10px;
margin:10px 0;
border-radius:10px;
border:none;
background:#111;
color:white;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>We Don’t Edit.<br><span>We Create Attention.</span></h1>
</div>

<!-- WORK -->
<section>
<h2>Our Work</h2>

<div class="categories">
<button class="active" onclick="filter('editing',this)">Editing</button>
<button onclick="filter('animation',this)">Animation</button>
<button onclick="filter('design',this)">Design</button>
</div>

<div class="grid">

<!-- EDITING -->
<div class="card" data-cat="editing"><div class="video-wrapper"><iframe src="https://drive.google.com/file/d/1Uk_xbE1idJdXPhVf-GnG0vq72L719MTn/preview"></iframe></div></div>
<div class="card" data-cat="editing"><div class="video-wrapper"><iframe src="https://drive.google.com/file/d/1ckvhMgp0gTTWBwmOXaNMCKMU3pIGS7eF/preview"></iframe></div></div>
<div class="card" data-cat="editing"><div class="video-wrapper"><iframe src="https://drive.google.com/file/d/1ptn8VXK2ysjQh7Ij_jqHm5TGAT-T9Emf/preview"></iframe></div></div>
<div class="card" data-cat="editing"><div class="video-wrapper"><iframe src="https://drive.google.com/file/d/16o_ZX4LCJbMcZREonoRq6KWtH-5Nc8aP/preview"></iframe></div></div>

<!-- ANIMATION -->
<div class="card" data-cat="animation"><div class="video-wrapper"><iframe src="https://drive.google.com/file/d/1Tjo3t-zTR7Dubpl3fBGv__nOdX528T4c/preview"></iframe></div></div>
<div class="card" data-cat="animation"><div class="video-wrapper"><iframe src="https://drive.google.com/file/d/1i08rY4_pNrzm8hnRnUHru-IeQGBOvYkR/preview"></iframe></div></div>
<div class="card" data-cat="animation"><div class="video-wrapper"><iframe src="https://drive.google.com/file/d/1lzOx7mjvDYy0JzRmk4IrrhORhxpIo16c/preview"></iframe></div></div>
<div class="card" data-cat="animation"><div class="video-wrapper"><iframe src="https://drive.google.com/file/d/1gsCPhe5W-4UADjVbndktFEMUcPvj3zpl/preview"></iframe></div></div>

<!-- DESIGN -->
<div class="card" data-cat="design"><img src="https://lh3.googleusercontent.com/d/1UiDcyn-XxPzaWM0M5hWAqRSry9SoNvcO"></div>
<div class="card" data-cat="design"><img src="https://lh3.googleusercontent.com/d/1UC3waeVQFbhh0GMv_v0_XdDEQN4AhHMo"></div>
<div class="card" data-cat="design"><img src="https://lh3.googleusercontent.com/d/1u6Td0sJ30MgngZSmyu8wc3xRQR7MXpOE"></div>
<div class="card" data-cat="design"><img src="https://lh3.googleusercontent.com/d/1YFD7dOu41_at3jLrBeXymShVX3vixeqF"></div>

</div>
</section>

<!-- BEFORE AFTER -->
<section>
<h2>Before vs After</h2>
<div class="compare">
<div class="compare-box">
<h4>Before</h4>
<img src="https://via.placeholder.com/250x300">
</div>
<div class="compare-box">
<h4>After</h4>
<img src="https://via.placeholder.com/250x300">
</div>
</div>
</section>

<!-- TESTIMONIAL -->
<section>
<h2>Client Results</h2>
<div class="testimonials">
<div class="test">🔥 2M+ views in 3 days</div>
<div class="test">🚀 Increased engagement massively</div>
<div class="test">💎 Premium content upgrade</div>
</div>
</section>

<!-- PRICING -->
<section>
<h2>Pricing</h2>
<div class="pricing">
<div class="price">Basic<br>$30–100</div>
<div class="price">Standard<br>$100–150</div>
<div class="price">Pro<br>$150–200</div>
<div class="price">Premium<br>$200+</div>
</div>
</section>

<!-- FORM -->
<section>
<h2>Start Your Project</h2>
<div class="form">
<form onsubmit="sendEmail(event)">
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">
<select id="service">
<option>Editing</option>
<option>Animation</option>
<option>Design</option>
</select>
<select id="budget">
<option>$30-100</option>
<option>$100-150</option>
<option>$150-200</option>
<option>$200+</option>
</select>
<textarea id="details" placeholder="Details"></textarea>
<button>Send</button>
</form>
</div>
</section>

<script>
function filter(type,btn){
let cards=document.querySelectorAll('.card');
let buttons=document.querySelectorAll('.categories button');

buttons.forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

cards.forEach(card=>{
card.style.display=(card.dataset.cat===type)?"block":"none";
});
}

function sendEmail(e){
e.preventDefault();
let body=`Name:${name.value}%0AEmail:${email.value}`;
window.location.href=`mailto:prymflo@gmail.com?subject=Project&body=${body}`;
}

filter('editing',document.querySelector('.categories button'));
</script>

</body>
</html>
