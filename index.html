<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#000;
color:white;
overflow-x:hidden;
}

/* NAV */
.nav{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
align-items:center;
padding:20px 60px;
background:rgba(0,0,0,0.6);
backdrop-filter:blur(20px);
z-index:100;
}

.nav img{height:45px;}
.nav a{color:#aaa;margin-left:25px;text-decoration:none;}
.nav a:hover{color:white;}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.hero h1{
font-size:5rem;
line-height:1.1;
animation:fadeUp 1.5s ease;
}

.hero span{
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
margin-top:30px;
padding:16px 40px;
border-radius:50px;
border:none;
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 40px #C9A1F0;
}

/* SECTION */
section{
padding:140px 80px;
text-align:center;
}

h2{
font-size:3rem;
margin-bottom:60px;
}

/* SCROLL ANIMATION */
.reveal{
opacity:0;
transform:translateY(60px);
transition:1s;
}

.reveal.active{
opacity:1;
transform:translateY(0);
}

/* WORK */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:30px;
}

.card{
border-radius:20px;
overflow:hidden;
transition:0.4s;
}

.card iframe,.card img{
width:100%;
height:300px;
object-fit:cover;
}

.card:hover{
transform:scale(1.05);
}

/* PRICING */
.pricing{
display:flex;
justify-content:center;
gap:40px;
flex-wrap:wrap;
}

.price-box{
padding:40px;
border-radius:20px;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
transition:0.4s;
width:250px;
}

.price-box:hover{
transform:scale(1.1);
box-shadow:0 0 50px rgba(201,161,240,0.4);
}

.price{
font-size:2rem;
margin-top:10px;
color:#C9A1F0;
}

/* FORM */
.form-box{
max-width:500px;
margin:auto;
background:rgba(255,255,255,0.05);
backdrop-filter:blur(20px);
padding:30px;
border-radius:20px;
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
background:#111;
color:white;
}

/* ANIM */
@keyframes fadeUp{
from{opacity:0; transform:translateY(40px);}
to{opacity:1; transform:translateY(0);}
}

footer{
text-align:center;
padding:60px;
color:#777;
}
</style>
</head>

<body>

<!-- NAV -->
<div class="nav">
<img src="https://lh3.googleusercontent.com/d/1PfQ73bYvnnha3x9-cl7Vme6lh_33QRI0">
<div>
<a href="#work">Work</a>
<a href="#pricing">Pricing</a>
<a href="#order">Order</a>
</div>
</div>

<!-- HERO -->
<section class="hero">
<h1>We Don’t Edit.<br><span>We Create Attention.</span></h1>
<button class="btn" onclick="scrollToSection('order')">Start Project</button>
</section>

<!-- WORK -->
<section id="work" class="reveal">
<h2>Selected Work</h2>

<div class="grid">

<div class="card"><iframe src="https://drive.google.com/file/d/1Uk_xbE1idJdXPhVf-GnG0vq72L719MTn/preview"></iframe></div>
<div class="card"><iframe src="https://drive.google.com/file/d/1ckvhMgp0gTTWBwmOXaNMCKMU3pIGS7eF/preview"></iframe></div>
<div class="card"><iframe src="https://drive.google.com/file/d/1ptn8VXK2ysjQh7Ij_jqHm5TGAT-T9Emf/preview"></iframe></div>
<div class="card"><iframe src="https://drive.google.com/file/d/16o_ZX4LCJbMcZREonoRq6KWtH-5Nc8aP/preview"></iframe></div>

<div class="card"><iframe src="https://drive.google.com/file/d/1Tjo3t-zTR7Dubpl3fBGv__nOdX528T4c/preview"></iframe></div>
<div class="card"><iframe src="https://drive.google.com/file/d/1i08rY4_pNrzm8hnRnUHru-IeQGBOvYkR/preview"></iframe></div>

<div class="card"><img src="https://lh3.googleusercontent.com/d/1UiDcyn-XxPzaWM0M5hWAqRSry9SoNvcO"></div>
<div class="card"><img src="https://lh3.googleusercontent.com/d/1UC3waeVQFbhh0GMv_v0_XdDEQN4AhHMo"></div>

</div>
</section>

<!-- PRICING -->
<section id="pricing" class="reveal">
<h2>Pricing</h2>

<div class="pricing">
<div class="price-box"><h3>Basic</h3><div class="price">$30-100</div></div>
<div class="price-box"><h3>Standard</h3><div class="price">$100-150</div></div>
<div class="price-box"><h3>Pro</h3><div class="price">$150-200</div></div>
<div class="price-box"><h3>Premium</h3><div class="price">$200+</div></div>
</div>
</section>

<!-- ORDER -->
<section id="order" class="reveal">
<h2>Start Your Project</h2>

<div class="form-box">
<form onsubmit="sendEmail(event)">
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">

<select id="service">
<option>Video Editing</option>
<option>Animation</option>
<option>Design</option>
</select>

<select id="budget">
<option>$30-100</option>
<option>$100-150</option>
<option>$150-200</option>
<option>$200+</option>
</select>

<textarea id="details" placeholder="Project details"></textarea>

<button class="btn">Send Request</button>
</form>
</div>
</section>

<footer>
<p>© PrimeFlow</p>
</footer>

<script>
function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

let reveals=document.querySelectorAll('.reveal');

window.addEventListener('scroll',()=>{
reveals.forEach(el=>{
if(el.getBoundingClientRect().top < window.innerHeight-100){
el.classList.add('active');
}
});
});

function sendEmail(e){
e.preventDefault();
let body=`Name:${name.value}%0AEmail:${email.value}%0AService:${service.value}%0ABudget:${budget.value}%0ADetails:${details.value}`;
window.location.href=`mailto:prymflo@gmail.com?subject=Project&body=${body}`;
}
</script>

</body>
</html>
