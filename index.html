<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#000;
color:white;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:4.5rem;
line-height:1.1;
}

.hero span{
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
margin-top:30px;
padding:15px 35px;
border-radius:40px;
border:none;
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
cursor:pointer;
}

/* CATEGORY */
.categories{
display:flex;
justify-content:center;
gap:20px;
margin:40px 0;
}

.categories button{
padding:10px 20px;
border-radius:20px;
border:none;
background:#111;
color:white;
cursor:pointer;
}

.categories .active{
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:20px;
padding:40px;
}

.card{
border-radius:15px;
overflow:hidden;
}

.card iframe{
width:100%;
height:400px;
}

.card img{
width:100%;
height:300px;
object-fit:cover;
}

/* PRICING */
.pricing{
text-align:center;
padding:100px 20px;
}

.price-box{
display:inline-block;
margin:10px;
padding:30px;
background:#111;
border-radius:20px;
}

/* FORM */
.form{
max-width:500px;
margin:auto;
padding:40px;
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
background:#111;
color:white;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>We Don’t Edit.<br><span>We Create Attention.</span></h1>
<button class="btn" onclick="scrollToSection('order')">Start Project</button>
</div>

<!-- CATEGORY SELECT -->
<div class="categories">
<button class="active" onclick="filter('editing',this)">Video Editing</button>
<button onclick="filter('animation',this)">Animation</button>
<button onclick="filter('design',this)">Graphic Design</button>
</div>

<!-- WORK GRID -->
<div class="grid">

<!-- EDITING -->
<div class="card" data-cat="editing"><iframe src="https://drive.google.com/file/d/1Uk_xbE1idJdXPhVf-GnG0vq72L719MTn/preview"></iframe></div>
<div class="card" data-cat="editing"><iframe src="https://drive.google.com/file/d/1ckvhMgp0gTTWBwmOXaNMCKMU3pIGS7eF/preview"></iframe></div>
<div class="card" data-cat="editing"><iframe src="https://drive.google.com/file/d/1ptn8VXK2ysjQh7Ij_jqHm5TGAT-T9Emf/preview"></iframe></div>
<div class="card" data-cat="editing"><iframe src="https://drive.google.com/file/d/16o_ZX4LCJbMcZREonoRq6KWtH-5Nc8aP/preview"></iframe></div>

<!-- ANIMATION -->
<div class="card" data-cat="animation"><iframe src="https://drive.google.com/file/d/1Tjo3t-zTR7Dubpl3fBGv__nOdX528T4c/preview"></iframe></div>
<div class="card" data-cat="animation"><iframe src="https://drive.google.com/file/d/1i08rY4_pNrzm8hnRnUHru-IeQGBOvYkR/preview"></iframe></div>
<div class="card" data-cat="animation"><iframe src="https://drive.google.com/file/d/1lzOx7mjvDYy0JzRmk4IrrhORhxpIo16c/preview"></iframe></div>
<div class="card" data-cat="animation"><iframe src="https://drive.google.com/file/d/1gsCPhe5W-4UADjVbndktFEMUcPvj3zpl/preview"></iframe></div>

<!-- DESIGN -->
<div class="card" data-cat="design"><img src="https://lh3.googleusercontent.com/d/1UiDcyn-XxPzaWM0M5hWAqRSry9SoNvcO"></div>
<div class="card" data-cat="design"><img src="https://lh3.googleusercontent.com/d/1UC3waeVQFbhh0GMv_v0_XdDEQN4AhHMo"></div>
<div class="card" data-cat="design"><img src="https://lh3.googleusercontent.com/d/1u6Td0sJ30MgngZSmyu8wc3xRQR7MXpOE"></div>
<div class="card" data-cat="design"><img src="https://lh3.googleusercontent.com/d/1YFD7dOu41_at3jLrBeXymShVX3vixeqF"></div>

</div>

<!-- PRICING -->
<div class="pricing">
<h2>Pricing</h2>
<div class="price-box">$30–100</div>
<div class="price-box">$100–150</div>
<div class="price-box">$150–200</div>
<div class="price-box">$200+</div>
</div>

<!-- ORDER -->
<div id="order" class="form">
<h2>Start Your Project</h2>

<form onsubmit="sendEmail(event)">
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">

<select id="service">
<option>Video Editing</option>
<option>Animation</option>
<option>Graphic Design</option>
</select>

<select id="budget">
<option>$30-100</option>
<option>$100-150</option>
<option>$150-200</option>
<option>$200+</option>
</select>

<textarea id="details" placeholder="Details"></textarea>

<button class="btn">Send Request</button>
</form>
</div>

<script>
function filter(type,btn){
let cards=document.querySelectorAll('.card');
let buttons=document.querySelectorAll('.categories button');

buttons.forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

cards.forEach(card=>{
card.style.display=(card.dataset.cat===type)?"block":"none";
});
}

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function sendEmail(e){
e.preventDefault();
let body=`Name:${name.value}%0AEmail:${email.value}%0AService:${service.value}%0ABudget:${budget.value}%0ADetails:${details.value}`;
window.location.href=`mailto:prymflo@gmail.com?subject=Project&body=${body}`;
}

/* default filter */
filter('editing',document.querySelector('.categories button'));
</script>

</body>
</html>
