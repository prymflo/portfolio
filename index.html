<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PrimeFlow</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:#050509;
color:white;
overflow-x:hidden;
}

/* HERO */
.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
}

.hero h1{
font-size:4.5rem;
max-width:900px;
}

.hero span{
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
-webkit-background-clip:text;
-webkit-text-fill-color:transparent;
}

.btn{
margin-top:30px;
padding:16px 40px;
border-radius:50px;
border:none;
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
cursor:pointer;
transition:0.3s;
}

.btn:hover{
transform:scale(1.1);
box-shadow:0 0 40px #C9A1F0;
}

/* TRUST */
.trust{
display:flex;
justify-content:center;
gap:80px;
padding:60px;
font-size:1.2rem;
}

/* CATEGORY */
.categories{
display:flex;
justify-content:center;
gap:20px;
margin:40px 0;
}

.categories button{
padding:12px 25px;
border-radius:30px;
border:none;
background:#111;
color:white;
cursor:pointer;
}

.categories .active{
background:linear-gradient(90deg,#C9A1F0,#FF6EC7);
}

/* GRID */
.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(320px,1fr));
gap:25px;
padding:60px;
}

.card{
border-radius:20px;
overflow:hidden;
background:#111;
transition:0.4s;
}

.card:hover{
transform:scale(1.05);
box-shadow:0 0 40px rgba(201,161,240,0.3);
}

.card iframe{
width:100%;
height:420px;
}

/* BEFORE AFTER */
.compare{
display:flex;
justify-content:center;
gap:40px;
padding:100px;
flex-wrap:wrap;
}

.compare img{
width:400px;
border-radius:20px;
}

/* TESTIMONIALS */
.testimonials{
display:flex;
justify-content:center;
gap:30px;
flex-wrap:wrap;
padding:100px;
}

.test{
background:#111;
padding:30px;
border-radius:20px;
max-width:300px;
}

/* PRICING */
.pricing{
display:flex;
justify-content:center;
gap:40px;
padding:100px;
flex-wrap:wrap;
}

.price{
background:#111;
padding:40px;
border-radius:20px;
transition:0.3s;
}

.price:hover{
transform:scale(1.1);
box-shadow:0 0 50px rgba(201,161,240,0.4);
}

/* FORM */
.form{
max-width:500px;
margin:auto;
padding:60px;
}

input,select,textarea{
width:100%;
padding:12px;
margin:10px 0;
border-radius:10px;
border:none;
background:#111;
color:white;
}
</style>
</head>

<body>

<!-- HERO -->
<div class="hero">
<h1>We Don’t Edit Videos.<br><span>We Engineer Virality.</span></h1>
<button class="btn" onclick="scrollToSection('order')">Start Project</button>
</div>

<!-- TRUST -->
<div class="trust">
<div>🔥 10M+ Views Generated</div>
<div>🚀 100+ Projects Delivered</div>
<div>💼 Trusted by Creators</div>
</div>

<!-- CATEGORY -->
<div class="categories">
<button class="active" onclick="filter('editing',this)">Editing</button>
<button onclick="filter('animation',this)">Animation</button>
<button onclick="filter('design',this)">Design</button>
</div>

<!-- WORK -->
<div class="grid">

<div class="card" data-cat="editing"><iframe src="https://drive.google.com/file/d/1Uk_xbE1idJdXPhVf-GnG0vq72L719MTn/preview"></iframe></div>
<div class="card" data-cat="editing"><iframe src="https://drive.google.com/file/d/1ckvhMgp0gTTWBwmOXaNMCKMU3pIGS7eF/preview"></iframe></div>

<div class="card" data-cat="animation"><iframe src="https://drive.google.com/file/d/1Tjo3t-zTR7Dubpl3fBGv__nOdX528T4c/preview"></iframe></div>

<div class="card" data-cat="design"><iframe src="https://drive.google.com/file/d/1UiDcyn-XxPzaWM0M5hWAqRSry9SoNvcO/preview"></iframe></div>

</div>

<!-- BEFORE AFTER -->
<div class="compare">
<div>
<h3>Before</h3>
<img src="https://via.placeholder.com/400x300">
</div>
<div>
<h3>After</h3>
<img src="https://via.placeholder.com/400x300">
</div>
</div>

<!-- TESTIMONIALS -->
<div class="testimonials">
<div class="test">“Got 2M views in 3 days 🔥”</div>
<div class="test">“Best editor I’ve worked with”</div>
<div class="test">“My content finally looks premium”</div>
</div>

<!-- PRICING -->
<div class="pricing">
<div class="price">$30-100</div>
<div class="price">$100-150</div>
<div class="price">$150-200</div>
<div class="price">$200+</div>
</div>

<!-- FORM -->
<div id="order" class="form">
<h2>Start Your Project</h2>

<form onsubmit="sendEmail(event)">
<input id="name" placeholder="Name">
<input id="email" placeholder="Email">

<select id="service">
<option>Editing</option>
<option>Animation</option>
<option>Design</option>
</select>

<select id="budget">
<option>$30-100</option>
<option>$100-150</option>
<option>$150-200</option>
<option>$200+</option>
</select>

<textarea id="details" placeholder="Project details"></textarea>

<button class="btn">Send Request</button>
</form>
</div>

<script>
function filter(type,btn){
let cards=document.querySelectorAll('.card');
let buttons=document.querySelectorAll('.categories button');

buttons.forEach(b=>b.classList.remove('active'));
btn.classList.add('active');

cards.forEach(card=>{
card.style.display=(card.dataset.cat===type)?"block":"none";
});
}

function scrollToSection(id){
document.getElementById(id).scrollIntoView({behavior:"smooth"});
}

function sendEmail(e){
e.preventDefault();
let body=`Name:${name.value}%0AEmail:${email.value}%0AService:${service.value}%0ABudget:${budget.value}%0ADetails:${details.value}`;
window.location.href=`mailto:prymflo@gmail.com?subject=Project&body=${body}`;
}

filter('editing',document.querySelector('.categories button'));
</script>

</body>
</html>
